name: Auto-update repos on profile

on:
  schedule:
    # gentle: twice a day. Enough to stay current + keep the schedule alive,
    # without looking like automated abuse to GitHub.
    - cron: "0 6,18 * * *"
  workflow_dispatch:          # run manually anytime

concurrency:
  group: profile-refresh
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Checkout repository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --depth=1 --branch "${{ github.ref_name }}" \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" .

      - name: Refresh profile sections (race-proof)
        env:
          OWNER: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          gen() { python .github/scripts/update_repos.py; }
          gen
          if git diff --quiet -- README.md; then
            echo "no changes"; exit 0
          fi
          for attempt in 1 2 3; do
            git add README.md
            git commit -m "auto: refresh profile (repos/activity/stats)" || true
            if git push; then echo "pushed on attempt $attempt"; exit 0; fi
            git fetch origin main
            git reset --hard origin/main
            gen
            if git diff --quiet -- README.md; then echo "in sync"; exit 0; fi
          done
          echo "will self-heal next run"; exit 0
