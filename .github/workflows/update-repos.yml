name: Auto-update repos on profile

on:
  schedule:
    - cron: "0 */3 * * *"   # every 3 hours — new repos appear on their own
  workflow_dispatch:          # run manually anytime
  push:
    branches: [main]
    paths:
      - ".github/scripts/update_repos.py"
      - ".github/workflows/update-repos.yml"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate repo cards
        env:
          OWNER: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/update_repos.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- README.md; then
            git add README.md
            git commit -m "auto: refresh repo cards on profile"
            git push
          else
            echo "no changes to commit"
          fi
